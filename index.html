<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>WORLD CUP 2026 - ULTRA EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Rowdies:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --dark-blue: #0a192f;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            font-family: 'Oswald', sans-serif;
            background: #000;
        }

        /* FUNDO PSICODÉLICO ULTRA */
        #main-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://api.clippat.com/api/v1/files/image_8bfcd4.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.6) contrast(1.2);
            z-index: -1;
            animation: bgPulse 20s infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* INTERFACE PRINCIPAL */
        #app-shell {
            display: flex;
            width: 100%; height: 100%;
            perspective: 2000px;
        }

        /* MENU LATERAL */
        #side-menu {
            width: 250px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-right: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }

        #album-cover-img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 0 20px var(--gold);
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            background: var(--gold);
            color: #000;
            font-weight: bold;
            font-size: 18px;
            text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-action:active { transform: scale(0.9); }

        /* ÁREA DO ÁLBUM (PÁGINAS) */
        #album-viewport {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .page {
            position: absolute;
            width: 80%;
            height: 90%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 15px;
            padding: 30px;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-style: preserve-3d;
        }

        .page.hidden-left { transform: translateX(-150%) rotateY(-90deg); }
        .page.hidden-right { transform: translateX(150%) rotateY(90deg); }

        .slot {
            background: rgba(0,0,0,0.4);
            border: 2px dashed rgba(255,215,0,0.3);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: rgba(255,215,0,0.2);
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .slot.filled { border: 2px solid var(--gold); background: white; }

        /* FIGURINHA NO ÁLBUM */
        .sticker {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: glueAnim 0.5s ease-out;
        }

        @keyframes glueAnim {
            0% { transform: scale(2); opacity: 0; filter: brightness(3); }
            100% { transform: scale(1); opacity: 1; filter: brightness(1); }
        }

        /* OVERLAY DO PACOTE (ANIMAÇÃO DE RASGAR) */
        #pack-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            z-index: 1000;
            justify-content: center; align-items: center;
        }

        .pack-wrapper {
            position: relative;
            width: 300px; height: 450px;
            cursor: pointer;
        }

        .pack-half {
            position: absolute;
            width: 100%; height: 50%;
            background-image: url('https://api.clippat.com/api/v1/files/image_8bfbf6.png');
            background-size: 300px 450px;
            transition: transform 1s ease-in;
        }

        .pack-top { top: 0; background-position: top; border-bottom: 2px dashed #fff; }
        .pack-bottom { bottom: 0; background-position: bottom; }

        .pack-wrapper.ripped .pack-top { transform: translateY(-120%) rotate(-10deg); opacity: 0; }
        .pack-wrapper.ripped .pack-bottom { transform: translateY(120%) rotate(10deg); opacity: 0; }

        /* PILHA DE FIGURINHAS (SWIPE) */
        #card-stack {
            position: absolute;
            width: 250px; height: 350px;
            display: none;
            z-index: 1100;
        }

        .revealed-card {
            position: absolute;
            width: 100%; height: 100%;
            background: white;
            border: 8px solid #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            transition: transform 0.5s, opacity 0.5s;
            cursor: grab;
        }

        .revealed-card img { width: 100%; height: 80%; object-fit: contain; background: #f0f0f0; }
        .revealed-card .info { 
            height: 20%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: #000;
        }

        /* AUDIO PLAYER ESCONDIDO */
        #music-container { position: absolute; left: -9999px; }

        #inventory-toast {
            position: fixed;
            bottom: 20px; right: 20px;
            background: var(--gold);
            color: black;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            display: none;
            z-index: 2000;
        }

    </style>
</head>
<body>

<div id="main-bg"></div>

<div id="app-shell">
    <div id="side-menu">
        <img src="https://api.clippat.com/api/v1/files/image_8bfc38.jpg" id="album-cover-img" onclick="toggleMusic()">
        <div style="color:var(--gold); font-size: 24px; margin-bottom: 10px;">⭐ <span id="money-val">100</span></div>
        <button class="btn-action" onclick="showPackOpening()">ABRIR PACOTE</button>
        <button class="btn-action" onclick="prevPage()">PÁGINA ANTERIOR</button>
        <button class="btn-action" onclick="nextPage()">PRÓXIMA PÁGINA</button>
        <div style="margin-top: auto; font-size: 12px; opacity: 0.5;">ULTRA ENGINE V1.0</div>
    </div>

    <div id="album-viewport" id="album-container">
        </div>
</div>

<div id="pack-overlay">
    <div class="pack-wrapper" id="pack-click" onclick="ripPack()">
        <div class="pack-half pack-top"></div>
        <div class="pack-half pack-bottom"></div>
    </div>
    <div id="card-stack"></div>
</div>

<div id="inventory-toast">Você ganhou novas figurinhas!</div>

<div id="music-container">
    <iframe id="yt-player" width="1" height="1" 
    src="https://www.youtube.com/embed/HmpzUm5j4OE?enablejsapi=1&autoplay=1&loop=1&playlist=HmpzUm5j4OE" 
    frameborder="0" allow="autoplay"></iframe>
</div>

<script>
    // BANCO DE DADOS GIGANTE DE JOGADORES
    const ALL_PLAYERS = [
        { id: 1, name: "Neymar Jr", img: "https://api.clippat.com/api/v1/files/image_8bf833.png", rarity: "Legend" },
        { id: 2, name: "Cristiano Ronaldo", img: "https://api.clippat.com/api/v1/files/image_8bf4f3.png", rarity: "Legend" },
        { id: 3, name: "Lionel Messi", img: "https://api.clippat.com/api/v1/files/image_8bf4b7.png", rarity: "Legend" },
        { id: 4, name: "Kylian Mbappé", img: "https://api.clippat.com/api/v1/files/image_8bf188.png", rarity: "Epic" },
        { id: 5, name: "Harry Kane", img: "https://api.clippat.com/api/v1/files/image_8b9ebd.png", rarity: "Rare" },
        { id: 6, name: "Lamine Yamal", img: "https://api.clippat.com/api/v1/files/image_8b9e20.png", rarity: "Rare" },
        { id: 7, name: "Vini Jr", img: "https://api.clippat.com/api/v1/files/image_8b9a97.png", rarity: "Epic" },
        // Jogadores Adicionais para volume
        { id: 8, name: "Kevin De Bruyne", img: "https://api.clippat.com/api/v1/files/image_8bf188.png", rarity: "Rare" },
        { id: 9, name: "Erling Haaland", img: "https://api.clippat.com/api/v1/files/image_8b9ebd.png", rarity: "Epic" },
        { id: 10, name: "Robert Lewandowski", img: "https://api.clippat.com/api/v1/files/image_8bf4f3.png", rarity: "Rare" },
        { id: 11, name: "Mohamed Salah", img: "https://api.clippat.com/api/v1/files/image_8b9a97.png", rarity: "Rare" },
        { id: 12, name: "Luka Modric", img: "https://api.clippat.com/api/v1/files/image_8bf4b7.png", rarity: "Legend" },
        { id: 13, name: "Casemiro", img: "https://api.clippat.com/api/v1/files/image_8bf833.png", rarity: "Rare" },
        { id: 14, name: "Alisson Becker", img: "https://api.clippat.com/api/v1/files/image_8bf833.png", rarity: "Rare" },
        { id: 15, name: "Jude Bellingham", img: "https://api.clippat.com/api/v1/files/image_8b9e20.png", rarity: "Epic" },
        { id: 16, name: "Antoine Griezmann", img: "https://api.clippat.com/api/v1/files/image_8bf188.png", rarity: "Rare" }
        // ... O código pode suportar centenas
    ];

    let myInventory = [];
    let gluedStickers = JSON.parse(localStorage.getItem('glued')) || [];
    let currentPage = 0;
    let coins = 100;

    // INICIALIZAÇÃO
    function init() {
        renderAlbum();
        updateUI();
    }

    function renderAlbum() {
        const viewport = document.getElementById('album-viewport');
        viewport.innerHTML = '';
        
        const totalPages = Math.ceil(ALL_PLAYERS.length / 8);
        
        for(let p = 0; p < totalPages; p++) {
            const pageDiv = document.createElement('div');
            pageDiv.className = `page ${p === 0 ? '' : 'hidden-right'}`;
            pageDiv.id = `page-${p}`;
            
            const start = p * 8;
            for(let i = start; i < start + 8; i++) {
                const player = ALL_PLAYERS[i];
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.innerHTML = player ? player.id : '';
                
                if(gluedStickers.includes(player?.id)) {
                    slot.classList.add('filled');
                    slot.innerHTML = `<img src="${player.img}" class="sticker">`;
                } else if(player) {
                    slot.onclick = () => glueCard(player.id);
                }
                
                pageDiv.appendChild(slot);
            }
            viewport.appendChild(pageDiv);
        }
    }

    // NAVEGAÇÃO
    function nextPage() {
        const totalPages = Math.ceil(ALL_PLAYERS.length / 8);
        if(currentPage < totalPages - 1) {
            document.getElementById(`page-${currentPage}`).className = 'page hidden-left';
            currentPage++;
            document.getElementById(`page-${currentPage}`).className = 'page';
        }
    }

    function prevPage() {
        if(currentPage > 0) {
            document.getElementById(`page-${currentPage}`).className = 'page hidden-right';
            currentPage--;
            document.getElementById(`page-${currentPage}`).className = 'page';
        }
    }

    // ABRIR PACOTE
    function showPackOpening() {
        if(coins < 10) return alert("Sem moedas!");
        coins -= 10;
        updateUI();
        
        const overlay = document.getElementById('pack-overlay');
        const pack = document.getElementById('pack-click');
        const stack = document.getElementById('card-stack');
        
        overlay.style.display = 'flex';
        pack.classList.remove('ripped');
        pack.style.display = 'block';
        stack.style.display = 'none';
        stack.innerHTML = '';
    }

    function ripPack() {
        const pack = document.getElementById('pack-click');
        pack.classList.add('ripped');
        
        setTimeout(() => {
            pack.style.display = 'none';
            generateCardsForPack();
        }, 1000);
    }

    function generateCardsForPack() {
        const stack = document.getElementById('card-stack');
        stack.style.display = 'block';
        
        // Ganha 3 cartas aleatórias
        for(let i = 0; i < 3; i++) {
            const p = ALL_PLAYERS[Math.floor(Math.random() * ALL_PLAYERS.length)];
            myInventory.push(p.id);
            
            const card = document.createElement('div');
            card.className = 'revealed-card';
            card.style.zIndex = 100 - i;
            card.style.transform = `rotate(${Math.random()*10 - 5}deg)`;
            
            card.innerHTML = `
                <img src="${p.img}">
                <div class="info">
                    <strong>${p.name}</strong>
                    <small>${p.rarity}</small>
                </div>
            `;
            
            // LÓGICA DE SWIPE (SIMPLIFICADA)
            card.onclick = () => {
                card.style.transform = 'translateX(500px) rotate(45deg)';
                card.style.opacity = '0';
                setTimeout(() => {
                    card.remove();
                    if(stack.children.length === 0) {
                        closeOverlay();
                    }
                }, 500);
            };
            
            stack.appendChild(card);
        }
    }

    function closeOverlay() {
        document.getElementById('pack-overlay').style.display = 'none';
        const toast = document.getElementById('inventory-toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // COLAR CARTA
    function glueCard(id) {
        if(myInventory.includes(id)) {
            gluedStickers.push(id);
            localStorage.setItem('glued', JSON.stringify(gluedStickers));
            
            // Remove uma unidade do inventário
            const idx = myInventory.indexOf(id);
            myInventory.splice(idx, 1);
            
            renderAlbum();
        } else {
            alert("Você não tem esta figurinha no seu inventário!");
        }
    }

    function updateUI() {
        document.getElementById('money-val').innerText = coins;
    }

    init();
</script>

</body>
</html>
