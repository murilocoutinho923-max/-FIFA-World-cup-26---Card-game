<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
    <title>WORLD CUP 2026 - ULTRA EDITION</title>
    <style>
        :root {
            --gold: #ffd700;
            --dark-blue: #0a192f;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background: #000;
        }

        /* 1. O FUNDO PSICODÉLICO (ULTRA RES) */
        #main-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('https://api.clippat.com/api/v1/files/image_8bfcba.jpg'); /* image_13.png */
            background-size: cover;
            background-position: center;
            filter: brightness(0.6) contrast(1.2);
            z-index: -1;
            animation: bgPulse 20s infinite alternate;
        }

        @keyframes bgPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* INTERFACE PRINCIPAL */
        #app-shell {
            display: flex;
            width: 100%; height: 100%;
            perspective: 2000px;
        }

        /* MENU LATERAL */
        #side-menu {
            width: 250px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-right: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }

        /* 2. O LOGO DA COPA */
        #copa-logo {
            width: 100%;
            max-width: 180px;
            margin-bottom: 20px;
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            background: var(--gold);
            color: #000;
            font-weight: bold;
            font-size: 18px;
            text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-action:active { transform: scale(0.9); }

        /* ÁREA DO ÁLBUM (PÁGINAS) */
        #album-viewport {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .page {
            position: absolute;
            width: 80%;
            height: 90%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4x2 por página */
            grid-template-rows: repeat(2, 1fr);
            gap: 15px;
            padding: 30px;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-style: preserve-3d;
        }

        .page.hidden-left { transform: translateX(-150%) rotateY(-90deg); }
        .page.hidden-right { transform: translateX(150%) rotateY(90deg); }

        /* 4. OS SLOTS DO ÁLBUM (Silhuetas douradas, não caixas brancas) */
        .slot {
            background: rgba(0,0,0,0.6);
            border: 2px dashed rgba(255,215,0,0.3);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255,215,0,0.2);
            font-size: 24px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .slot.filled { border: 2px solid var(--gold); }

        /* FIGURINHA NO ÁLBUM (com borda real de figurinha) */
        .sticker {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 5px solid #fff; /* Borda branca de figurinha */
            border-radius: 5px;
            animation: glueAnim 0.5s ease-out;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        @keyframes glueAnim {
            0% { transform: scale(2); opacity: 0; filter: brightness(3); }
            100% { transform: scale(1); opacity: 1; filter: brightness(1); }
        }

        /* OVERLAY DO PACOTE (ANIMAÇÃO DE RASGAR REAL) */
        #pack-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            z-index: 1000;
            justify-content: center; align-items: center;
        }

        /* 3. O PACOTINHO REAL COMO BOTÃO */
        .pack-wrapper {
            position: relative;
            width: 300px; height: 450px;
            cursor: pointer;
        }

        .pack-half {
            position: absolute;
            width: 100%; height: 50%;
            background-image: url('https://api.clippat.com/api/v1/files/image_8bfbf6.png'); /* image_11.png */
            background-size: 300px 450px;
            transition: transform 1s ease-in;
        }

        .pack-top { top: 0; background-position: top; border-bottom: 2px dashed #fff; }
        .pack-bottom { bottom: 0; background-position: bottom; }

        .pack-wrapper.ripped .pack-top { transform: translateY(-120%) rotate(-10deg); opacity: 0; }
        .pack-wrapper.ripped .pack-bottom { transform: translateY(120%) rotate(10deg); opacity: 0; }

        /* PILHA DE FIGURINHAS (SWIPE) */
        #card-stack {
            position: absolute;
            width: 250px; height: 350px;
            display: none;
            z-index: 1100;
        }

        /* Figurinhas abertas com borda real e foto */
        .revealed-card {
            position: absolute;
            width: 100%; height: 100%;
            background: white;
            border: 8px solid #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            transition: transform 0.5s, opacity 0.5s;
            cursor: grab;
        }

        .revealed-card img { width: 100%; height: 80%; object-fit: contain; background: #f0f0f0; }
        .revealed-card .info { 
            height: 20%; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: #000;
        }

        #inventory-toast {
            position: fixed;
            bottom: 20px; right: 20px;
            background: var(--gold);
            color: black;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            display: none;
            z-index: 2000;
        }

    </style>
</head>
<body>

<div id="main-bg"></div>

<div id="app-shell">
    <div id="side-menu">
        <img src="https://api.clippat.com/api/v1/files/image_8bfcd4.jpg" id="copa-logo" alt="Logo Copa 2026">
        <div style="color:var(--gold); font-size: 24px; margin-bottom: 10px;">⭐ <span id="money-val">100</span></div>
        <button class="btn-action" onclick="showPackOpening()">ABRIR PACOTE</button>
        <button class="btn-action" onclick="prevPage()">PÁGINA ANTERIOR</button>
        <button class="btn-action" onclick="nextPage()">PRÓXIMA PÁGINA</button>
        <div id="page-counter" style="margin-top: auto; font-size: 14px; color:rgba(255,255,255,0.7);">Página 1</div>
    </div>

    <div id="album-viewport">
        </div>
</div>

<div id="pack-overlay">
    <div class="pack-wrapper" id="pack-click" onclick="ripPack()">
        <div class="pack-half pack-top"></div>
        <div class="pack-half pack-bottom"></div>
    </div>
    <div id="card-stack"></div>
</div>

<div id="inventory-toast">Você ganhou novas figurinhas! Vá colá-las!</div>

<div id="music-container" style="position: absolute; left: -9999px;">
    <iframe id="yt-player" width="1" height="1" 
    src="https://www.youtube.com/embed/HmpzUm5j4OE?enablejsapi=1&autoplay=1&loop=1&playlist=HmpzUm5j4OE" 
    frameborder="0" allow="autoplay"></iframe>
</div>

<script>
    // 4. BANCO DE JOGADORES REAIS (Simulando volume)
    // Para este exemplo, usarei a mesma foto do João Pedro (image_12.png) para demonstrar
    // como carregar uma foto, mas com nomes e IDs diferentes.
    const JOGADORES_MÉSTRES = [
        { id: 1, name: "João Pedro", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 2, name: "Lucas Paquetá", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 3, name: "Bruno Guimarães", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 4, name: "Richarlison", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 5, name: "Raphael Veiga", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 6, name: "Danilo", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 7, name: "Éder Militão", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 8, name: "Ederson", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        // Adicionando mais jogadores para volume de código e páginas
        { id: 9, name: "Neymar Jr", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 10, name: "Casemiro", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 11, name: "Vini Jr", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 12, name: "Marquinhos", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 13, name: "Alisson Becker", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 14, name: "Gabriel Magalhães", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 15, name: "Gabriel Jesus", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        { id: 16, name: "Renan Lodi", img: "https://api.clippat.com/api/v1/files/image_8bfc72.png", country: "BRA" },
        // ... e assim por diante até 40+
    ];

    let myInventory = [];
    let gluedStickers = JSON.parse(localStorage.getItem('glued_wc2026')) || [];
    let currentPage = 0;
    let coins = 100;

    // INICIALIZAÇÃO
    function init() {
        renderAlbum();
        updateUI();
    }

    function renderAlbum() {
        const viewport = document.getElementById('album-viewport');
        viewport.innerHTML = '';
        
        const totalPages = Math.ceil(JOGADORES_MÉSTRES.length / 8);
        
        for(let p = 0; p < totalPages; p++) {
            const pageDiv = document.createElement('div');
            pageDiv.className = `page ${p === 0 ? '' : 'hidden-right'}`;
            pageDiv.id = `page-${p}`;
            
            const start = p * 8;
            for(let i = start; i < start + 8; i++) {
                const player = JOGADORES_MÉSTRES[i];
                const slot = document.createElement('div');
                slot.className = 'slot';
                
                if (player) {
                    slot.innerHTML = `<span>${player.id}</span>`;
                    
                    if(gluedStickers.includes(player.id)) {
                        slot.classList.add('filled');
                        slot.innerHTML = `<img src="${player.img}" class="sticker" alt="${player.name}">`;
                    } else {
                        // Mecânica de colagem (não-online)
                        slot.onclick = () => glueCard(player.id);
                    }
                }
                
                pageDiv.appendChild(slot);
            }
            viewport.appendChild(pageDiv);
        }
    }

    // NAVEGAÇÃO
    function nextPage() {
        const totalPages = Math.ceil(JOGADORES_MÉSTRES.length / 8);
        if(currentPage < totalPages - 1) {
            document.getElementById(`page-${currentPage}`).className = 'page hidden-left';
            currentPage++;
            document.getElementById(`page-${currentPage}`).className = 'page';
            updatePageCounter();
        }
    }

    function prevPage() {
        if(currentPage > 0) {
            document.getElementById(`page-${currentPage}`).className = 'page hidden-right';
            currentPage--;
            document.getElementById(`page-${currentPage}`).className = 'page';
            updatePageCounter();
        }
    }

    function updatePageCounter() {
        document.getElementById('page-counter').innerText = `Página ${currentPage + 1}`;
    }

    // ABRIR PACOTE
    function showPackOpening() {
        if(coins < 10) return alert("Acabaram as moedas!");
        coins -= 10;
        updateUI();
        
        const overlay = document.getElementById('pack-overlay');
        const pack = document.getElementById('pack-click');
        const stack = document.getElementById('card-stack');
        
        overlay.style.display = 'flex';
        pack.classList.remove('ripped');
        pack.style.display = 'block';
        stack.style.display = 'none';
        stack.innerHTML = '';
    }

    function ripPack() {
        const pack = document.getElementById('pack-click');
        pack.classList.add('ripped');
        
        setTimeout(() => {
            pack.style.display = 'none';
            generateCardsForPack();
        }, 1000);
    }

    function generateCardsForPack() {
        const stack = document.getElementById('card-stack');
        stack.style.display = 'block';
        
        // Ganha 3 cartas aleatórias
        for(let i = 0; i < 3; i++) {
            const p = JOGADORES_MÉSTRES[Math.floor(Math.random() * JOGADORES_MÉSTRES.length)];
            myInventory.push(p.id); // Adiciona ao inventário para colagem
            
            const card = document.createElement('div');
            card.className = 'revealed-card';
            card.style.zIndex = 100 - i;
            card.style.transform = `rotate(${Math.random()*10 - 5}deg)`;
            
            // 4. USANDO A FOTO REAL NA FIGURINHA
            card.innerHTML = `
                <img src="${p.img}">
                <div class="info">
                    <strong>${p.name}</strong>
                    <small>${p.country}</small>
                </div>
            `;
            
            // LÓGICA DE SWIPE/TOUCH PARA PASSAR A CARTA
            card.onclick = () => {
                card.style.transform = 'translateX(500px) rotate(45deg)';
                card.style.opacity = '0';
                setTimeout(() => {
                    card.remove();
                    if(stack.children.length === 0) {
                        closeOverlay();
                    }
                }, 500);
            };
            
            stack.appendChild(card);
        }
    }

    function closeOverlay() {
        document.getElementById('pack-overlay').style.display = 'none';
        const toast = document.getElementById('inventory-toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // COLAR CARTA (Localmente, para não dar erro online)
    function glueCard(id) {
        if(myInventory.includes(id)) {
            if(!gluedStickers.includes(id)) {
                gluedStickers.push(id);
                localStorage.setItem('glued_wc2026', JSON.stringify(gluedStickers));
                
                // Remove uma unidade do inventário
                const idx = myInventory.indexOf(id);
                myInventory.splice(idx, 1);
                
                renderAlbum(); // Re-renderiza a página para mostrar a figurinha
            }
        } else {
            alert("Você não tem esta figurinha no seu inventário! Abra pacotes.");
        }
    }

    function updateUI() {
        document.getElementById('money-val').innerText = coins;
    }

    init();
</script>

</body>
</html>
